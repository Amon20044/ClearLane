services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CLEARLANE_ARTIFACTS=/app/demo_artifacts
    # set CLEARLANE_LLM=1 and ANTHROPIC_API_KEY=... to enable the copilot extension

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
